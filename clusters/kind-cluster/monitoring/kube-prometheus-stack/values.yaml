# https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
alertmanager:
  enabled: true
  serviceMonitor:
    selfMonitor: true
    namespace: monitoring
prometheus:
  serviceMonitor:
    selfMonitor: true
    namespace: monitoring
  prometheusSpec:
    retention: 24h
    resources:
      requests:
        cpu: 200m
        memory: 200Mi
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorNamespaceSelector: {}
    podMonitorSelector:
      matchLabels:
        app.kubernetes.io/component: monitoring
grafana:
  defaultDashboardsEnabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
    labels:
      release: kube-prometheus-stack
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - localhost
  persistence:
    enabled: true
  adminPassword: grafana
  plugins:
    - camptocamp-prometheus-alertmanager-datasource
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway.loki
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 1000
    - name: "Prometheus AlertManager"
      type: camptocamp-prometheus-alertmanager-datasource
      uid: prometheus-alertmanager
      url: http://{{ template "kube-prometheus-stack.fullname" . }}-alertmanager.{{ template "kube-prometheus-stack.namespace" . }}:{{ .Values.alertmanager.service.port }}/{{ trimPrefix "/" .Values.alertmanager.alertmanagerSpec.routePrefix }}
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: "default"
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
  dashboards:
    default:
      postgresql:
        gnetId: 9628
        revision: 7
        datasource: Prometheus
      nginx:
        gnetId: 9614
        revision: 1
        datasource: Prometheus
      flux2:
        gnetId: 16714
        revision: 1
        datasource: Prometheus
      alertmanager:
        gnetId: 9578
        revision: 4
        datasource: Prometheus
      polkadot:
        gnetId: 13840
        revision: 4
        datasource: Prometheus
      node-exporter-full:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
prometheus-node-exporter:
  prometheus:
    monitor:
      relabelings:
      - action: replace
        sourceLabels: [__meta_kubernetes_pod_node_name]
        targetLabel: nodename
prometheusOperator:
  extraArgs:
   - --labels="cluster=kind-sqnc-flux-infra"
kubelet:
  enabled: true
  serviceMonitor:
    cAdvisor: true
    attachMetadata:
      node: true
    additionalLabels:
      release: kube-prometheus-stack
    cAdvisorRelabelings:
    - sourceLabels: [__address__]
      targetLabel: cluster
      replacement: kind-sqnc-flux-infra
