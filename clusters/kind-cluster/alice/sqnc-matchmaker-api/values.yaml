logLevel: info
userUri: //Alice
externalSqncNode:
  host: alice-node-sqnc-node-0
  port: 9944
externalSqncIpfs:
  host: alice-ipfs-sqnc-ipfs-api
  port: 5001
externalSqncIdentity:
  host: alice-identity-service-sqnc-identity-service
  port: 3000
auth:
  clientId: "sequence"
  publicUrlPrefix: "http://localhost:3080/auth/realms/alice/protocol/openid-connect"
  internalUrlPrefix: "http://keycloak.keycloak.svc.cluster.local/auth/realms/alice/protocol/openid-connect"
ingress:
  hostname: localhost
  paths:
    - path: /alice/(v1/attachment(/.*)?)
      pathType: Prefix
    - path: /alice/(v1/demandA(/.*)?)
      pathType: Prefix
    - path: /alice/(v1/demandB(/.*)?)
      pathType: Prefix
    - path: /alice/(v1/match2(/.*)?)
      pathType: Prefix
    - path: /alice/(v1/transaction(/.*)?)
      pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
node:
  enabled: false
tests:
  auth:
    clientSecret: secret
postgresql:
  auth:
    password: postgres
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring
      relabelings:
        - action: replace
          sourceLabels: [namespace]
          targetLabel: kubernetes_namespace
  primary:
    containerSecurityContext:
      readOnlyRootFilesystem: false
    extraVolumeMounts:
      - name: postgres-upgrade
        mountPath: /mnt/upgrade
    extraVolumes:
      - name: postgres-upgrade
        persistentVolumeClaim:
          claimName: matchmaker-api-postgres-upgrade-pv
  extraDeploy:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: matchmaker-api-postgres-upgrade-pv
        namespace: alice
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
    - apiVersion: batch/v1
      kind: Job
      metadata:
        name: alice-sqnc-matchmaker-api-postgresql-17
        namespace: alice
      spec:
        template:
          spec:
            securityContext:
              fsGroup: 1001
              runAsUser: 1001
            initContainers:
              - name: pgdump-17
                image: bitnami/postgresql:17
                imagePullPolicy: IfNotPresent
                securityContext:
                  runAsNonRoot: true
                  runAsUser: 1001
                command:
                  - /bin/sh
                  - -c
                args:
                  - |
                    pg_dump -d postgres://$POSTGRES_USER:$POSTGRES_PASSWORD@$HOST:$POSTGRESQL_PORT_NUMBER/$POSTGRES_DATABASE -f /mnt/upgrade/pg_dump
                volumeMounts:
                  - name: postgres-upgrade
                    mountPath: /mnt/upgrade
                env:
                  - name: POSTGRES_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: alice-sqnc-matchmaker-api-postgresql
                        key: password
                  - name: POSTGRES_USER
                    value: matchmaker_service
                  - name: POSTGRES_DATABASE
                    value: matchmaker
                  - name: POSTGRESQL_PORT_NUMBER
                    value: "5432"
                  - name: HOST
                    value: alice-sqnc-matchmaker-api-postgresql
            containers:
              - name: psql-17
                image: bitnami/postgresql:17
                imagePullPolicy: IfNotPresent
                securityContext:
                  runAsNonRoot: true
                  runAsUser: 1001
                command:
                  - /bin/sh
                  - -c
                args:
                  - |
                    psql -d postgres://$POSTGRES_USER:$POSTGRES_PASSWORD@$HOST:$POSTGRESQL_PORT_NUMBER/$POSTGRES_DATABASE -f /mnt/upgrade/pg_dump
                    mkdir -p /mnt/upgrade/tmp/
                    cp -R /opt/bitnami/postgresql /mnt/upgrade/tmp/
                volumeMounts:
                  - name: postgres-upgrade
                    mountPath: /mnt/upgrade
                env:
                  - name: POSTGRES_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: alice-sqnc-matchmaker-api-postgresql
                        key: password
                  - name: POSTGRES_USER
                    value: matchmaker_service
                  - name: POSTGRES_DATABASE
                    value: matchmaker
                  - name: POSTGRESQL_PORT_NUMBER
                    value: "5432"
                  - name: HOST
                    value: alice-sqnc-matchmaker-api-postgresql
            volumes:
              - name: postgres-upgrade
                persistentVolumeClaim:
                  claimName: matchmaker-api-postgres-upgrade-pv
            restartPolicy: OnFailure
      restartPolicy: OnFailure
      backoffLimit: 0
podAnnotations:
  instrumentation.opentelemetry.io/inject-nodejs: "monitoring/nodejs-instrumentation"
